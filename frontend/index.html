<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机电智学助手 - 华工杯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-gray-100 overflow-hidden">
    <div id="particles-js"></div>

    <main class="relative z-10 flex flex-col md:flex-row h-screen p-4 gap-4">
        <section class="flex-1 md:flex-[0.4] flex flex-col bg-gray-900/50 backdrop-blur-md rounded-2xl border border-gray-800">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center">
                <h2 class="font-bold text-xl text-blue-400">教授在线</h2>
                <span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-1 rounded">DeepSeek-V3 驱动</span>
            </div>
            
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm">
                <div class="bg-gray-800/80 p-3 rounded-lg self-start max-w-[90%]">
                    你好！我是机电工程学院的 AI 助手。今天想攻克哪个知识点？是 $G(s)$ 传递函数还是机械效率计算？
                </div>
            </div>

            <div class="p-4 border-t border-gray-800">
                <div class="flex gap-2">
                    <input id="user-input" type="text" placeholder="输入你的盲区，例如：PID积分饱和..." 
                           class="flex-1 bg-black border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                    <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition">发送</button>
                </div>
            </div>
        </section>

        <section class="flex-1 md:flex-[0.6] flex flex-col gap-4 overflow-y-auto">
            <div class="bg-gradient-to-br from-gray-900 to-blue-900/20 p-6 rounded-2xl border border-blue-500/30 shadow-2xl">
                <h3 class="text-lg font-bold mb-2 flex items-center">
                    <span class="mr-2">🔍</span> 深度诊断结果
                </h3>
                <div id="diagnosis-content" class="text-gray-300 leading-relaxed">
                    等待输入盲区...
                </div>
            </div>

            <div class="bg-gray-900/80 p-6 rounded-2xl border border-gray-800 min-h-[300px]">
                <h3 class="text-lg font-bold mb-4 flex items-center">
                    <span class="mr-2">📝</span> 智能闯关测试
                </h3>
                <div id="quiz-container" class="space-y-4">
                    </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
